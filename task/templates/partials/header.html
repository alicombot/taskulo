{% load static %}
<header class="header">
    <div class="nav">
        <h2 class="nav__title">Welcome back, {{ user.first_name }}👋</h2>

        <div class="nav__items">
            <div class="nav__item--profile">
                {% if user.photo %}
                    <img
                            class="profile__image"
                            src="{{ user.photo.url }}"
                            alt="profile"
                            width="78"
                            height="52"
                            id="avatar-header"
                    />
                {% else %}
                    <img
                            class="profile__image"
                            src="{% static 'images/user.png' %}"
                            alt="profile"
                            width="78"
                            height="52"
                            id="avatar-header"
                    />
                {% endif %}
            </div>

            <div
                    class="nav__item--date no-select"
                    onclick="toggleDatePicker()"
            >
                <time class="date">15 February 2025</time>
                <svg
                        width="21"
                        height="21"
                        viewBox="0 0 22 22"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                            d="M8.25 1.83337C8.75626 1.83337 9.16667 2.24378 9.16667 2.75004V3.66671H12.8333V2.75004C12.8333 2.24378 13.2437 1.83337 13.75 1.83337C14.2563 1.83337 14.6667 2.24378 14.6667 2.75004V3.66671H17.4167C18.4292 3.66671 19.25 4.48752 19.25 5.50004V17.4167C19.25 18.4292 18.4292 19.25 17.4167 19.25H4.58333C3.57081 19.25 2.75 18.4292 2.75 17.4167V5.50004C2.75 4.48752 3.57081 3.66671 4.58333 3.66671H7.33333V2.75004C7.33333 2.24378 7.74374 1.83337 8.25 1.83337ZM7.33333 5.50004H4.58333V8.25004H17.4167V5.50004H14.6667V6.41671C14.6667 6.92297 14.2563 7.33337 13.75 7.33337C13.2437 7.33337 12.8333 6.92297 12.8333 6.41671V5.50004H9.16667V6.41671C9.16667 6.92297 8.75626 7.33337 8.25 7.33337C7.74374 7.33337 7.33333 6.92297 7.33333 6.41671V5.50004ZM17.4167 10.0834H4.58333V17.4167H17.4167V10.0834Z"
                            fill="#1C1D22"
                    />
                </svg>
                <div id="date-picker" class="date-picker">
                    <div class="calendar" id="header-calendar">
                        <div class="calendar__header">
                            <button
                                    type="button"
                                    class="calendar__nav calendar__nav--prev"
                                    aria-label="Previous month"
                            >
                                ‹
                            </button>
                            <div class="calendar__title" id="calendar-title">
                                Month YYYY
                            </div>
                            <button
                                    type="button"
                                    class="calendar__nav calendar__nav--next"
                                    aria-label="Next month"
                            >
                                ›
                            </button>
                        </div>
                        <div class="calendar__weekdays">
                            <span>Su</span><span>Mo</span><span>Tu</span
                        ><span>We</span><span>Th</span><span>Fr</span
                        ><span>Sa</span>
                        </div>
                        <div class="calendar__grid" id="calendar-grid"></div>
                    </div>
                </div>
            </div>

            <div
                    class="nav__item--notification no-select"
                    onclick="toggleNotificationOptions()"
            >
                <svg
                        width="21"
                        height="21"
                        viewBox="0 0 22 22"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                            d="M9.30063 2.97748C9.57303 2.30652 10.2313 1.83337 11 1.83337C11.7687 1.83337 12.427 2.30652 12.6994 2.97748C15.4185 3.72236 17.4167 6.21119 17.4167 9.16671V13.4725L19.096 15.9916C19.2836 16.2729 19.3011 16.6345 19.1415 16.9326C18.982 17.2306 18.6714 17.4167 18.3333 17.4167H14.1758C13.9534 18.9715 12.6163 20.1667 11 20.1667C9.3837 20.1667 8.04656 18.9715 7.82416 17.4167H3.66667C3.32861 17.4167 3.01798 17.2306 2.85847 16.9326C2.69895 16.6345 2.71643 16.2729 2.90396 15.9916L4.58333 13.4725V9.16671C4.58333 6.21119 6.58151 3.72236 9.30063 2.97748ZM9.70324 17.4167C9.892 17.9508 10.4013 18.3334 11 18.3334C11.5987 18.3334 12.108 17.9508 12.2968 17.4167H9.70324ZM11 4.58337C8.4687 4.58337 6.41667 6.6354 6.41667 9.16671V13.75C6.41667 13.931 6.3631 14.1079 6.26271 14.2585L5.37948 15.5834H16.6205L15.7373 14.2585C15.6369 14.1079 15.5833 13.931 15.5833 13.75V9.16671C15.5833 6.6354 13.5313 4.58337 11 4.58337Z"
                            fill="#1C1D22"
                    />
                </svg>

                <div id="notification-options" class="notification-options">
                    <div class="notification-empty">
                        <div class="empty-state empty-state--notif">
                            <div class="empty-state__icon" aria-hidden="true">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
                                     xmlns="http://www.w3.org/2000/svg">
                                    <path d="M12 3a5 5 0 00-5 5v2.6c0 .7-.2 1.4-.7 1.9L5 14.5h14l-1.3-1.9c-.5-.5-.7-1.2-.7-1.9V8a5 5 0 00-5-5Z"
                                          stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                                    <path d="M9.5 18a2.5 2.5 0 005 0" stroke="currentColor" stroke-width="1.6"
                                          stroke-linecap="round"/>
                                </svg>
                            </div>
                            <div class="empty-state__content">
                                <h3 class="empty-state__title">نوتیف جدیدی نداری</h3>
                                <p class="empty-state__desc">وقتی کاری انجام بدی یا تغییری ایجاد بشه، اینجا ظاهر
                                    می‌شه</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <form class="nav__item--search" id="search-form" action=""
                  data-suggest-url="{% url 'task:search_suggest' %}" data-search-url="{% url 'task:search' %}">
                <svg
                        class="search__icon"
                        width="18"
                        height="18"
                        viewBox="0 0 22 22"
                        fill="none"
                        xmlns="http://www.w3.org/2000/svg"
                >
                    <path
                            d="M9.16671 3.66671C6.12914 3.66671 3.66671 6.12914 3.66671 9.16671C3.66671 12.2043 6.12914 14.6667 9.16671 14.6667C12.2043 14.6667 14.6667 12.2043 14.6667 9.16671C14.6667 6.12914 12.2043 3.66671 9.16671 3.66671ZM1.83337 9.16671C1.83337 5.11662 5.11662 1.83337 9.16671 1.83337C13.2168 1.83337 16.5 5.11662 16.5 9.16671C16.5 10.8614 15.9252 12.4218 14.9599 13.6635L19.8982 18.6019C20.2562 18.9598 20.2562 19.5402 19.8982 19.8982C19.5402 20.2562 18.9598 20.2562 18.6019 19.8982L13.6635 14.9599C12.4218 15.9252 10.8614 16.5 9.16671 16.5C5.11662 16.5 1.83337 13.2168 1.83337 9.16671Z"
                            fill="#1C1D22"
                    />
                </svg>
                <input id="search-input" name="q" type="search" placeholder="Search tasks, projects, people..."
                       autocomplete="off"/>
                <button type="button" class="search__btn" id="search-btn" aria-label="Search">
                    <svg
                            width="18"
                            height="18"
                            viewBox="0 0 24 24"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                    >
                        <path
                                d="M5 12h14M13 5l7 7-7 7"
                                stroke="currentColor"
                                stroke-width="2"
                                stroke-linecap="round"
                                stroke-linejoin="round"
                        />
                    </svg>
                </button>
                <div id="search-suggestions" class="search-suggestions" style="display:none"></div>
            </form>

        </div>
    </div>
    <div class="under-header">

        <div class="sort no-select">

            <div class="sort__wrapper" onclick="toggleSortOptions()">

                <p class="sort__text">Sort</p>

                <svg class="sort__logo" width="20" height="20" viewBox="0 0 22 22" fill="none"
                     xmlns="http://www.w3.org/2000/svg">
                    <g opacity="0.5">
                        <path d="M8.25 4.58333C7.74374 4.58333 7.33333 4.99374 7.33333 5.5C7.33333 6.00626 7.74374 6.41667 8.25 6.41667C8.75626 6.41667 9.16667 6.00626 9.16667 5.5C9.16667 4.99374 8.75626 4.58333 8.25 4.58333ZM5.65648 4.58333C6.034 3.51524 7.05263 2.75 8.25 2.75C9.44737 2.75 10.466 3.51524 10.8435 4.58333H17.4167C17.9229 4.58333 18.3333 4.99374 18.3333 5.5C18.3333 6.00626 17.9229 6.41667 17.4167 6.41667H10.8435C10.466 7.48476 9.44737 8.25 8.25 8.25C7.05263 8.25 6.034 7.48476 5.65648 6.41667H4.58333C4.07707 6.41667 3.66667 6.00626 3.66667 5.5C3.66667 4.99374 4.07707 4.58333 4.58333 4.58333H5.65648ZM13.75 10.0833C13.2437 10.0833 12.8333 10.4937 12.8333 11C12.8333 11.5063 13.2437 11.9167 13.75 11.9167C14.2563 11.9167 14.6667 11.5063 14.6667 11C14.6667 10.4937 14.2563 10.0833 13.75 10.0833ZM11.1565 10.0833C11.534 9.01524 12.5526 8.25 13.75 8.25C14.9474 8.25 15.966 9.01524 16.3435 10.0833H17.4167C17.9229 10.0833 18.3333 10.4937 18.3333 11C18.3333 11.5063 17.9229 11.9167 17.4167 11.9167H16.3435C15.966 12.9848 14.9474 13.75 13.75 13.75C12.5526 13.75 11.534 12.9848 11.1565 11.9167H4.58333C4.07707 11.9167 3.66667 11.5063 3.66667 11C3.66667 10.4937 4.07707 10.0833 4.58333 10.0833H11.1565ZM8.25 15.5833C7.74374 15.5833 7.33333 15.9937 7.33333 16.5C7.33333 17.0063 7.74374 17.4167 8.25 17.4167C8.75626 17.4167 9.16667 17.0063 9.16667 16.5C9.16667 15.9937 8.75626 15.5833 8.25 15.5833ZM5.65648 15.5833C6.034 14.5152 7.05263 13.75 8.25 13.75C9.44737 13.75 10.466 14.5152 10.8435 15.5833H17.4167C17.9229 15.5833 18.3333 15.9937 18.3333 16.5C18.3333 17.0063 17.9229 17.4167 17.4167 17.4167H10.8435C10.466 18.4848 9.44737 19.25 8.25 19.25C7.05263 19.25 6.034 18.4848 5.65648 17.4167H4.58333C4.07707 17.4167 3.66667 17.0063 3.66667 16.5C3.66667 15.9937 4.07707 15.5833 4.58333 15.5833H5.65648Z"
                              fill="black"></path>
                    </g>
                </svg>


            </div>

            <div id="sort-options" class="sort-options" style="display: none;">
                <div class="sort-option" onclick="selectOption('Newest')">Newest</div>
                <div class="sort-option" onclick="selectOption('Oldest')">Oldest</div>
                <div class="sort-option" onclick="selectOption('Due Soon')">Due Soon</div>
                <div class="sort-option" onclick="selectOption('High Priority')">High Priority</div>
                <div class="sort-option" onclick="selectOption('A-Z')">A-Z</div>
            </div>


        </div>

        <div class="line">
        </div>
    </div>
</header>
<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
