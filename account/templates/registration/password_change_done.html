{% extends  'base/index.html' %}
{% load static %}
{% block title %}
	Password Chanage
{% endblock %}
{% block content %}
    <main class="main" style="background:#f3f6fd; min-height: calc(100vh - 72px);">
    <div class="container" style="display:flex; align-items:center; justify-content:center; padding:4rem 0;">
        <div style="background:#fff; width:100%; max-width:44rem; border-radius:1.6rem; padding:2.4rem; box-shadow:0 10px 30px rgba(0,0,0,0.06); text-align:center;">
            <div class="section-head" style="margin-bottom:1.5rem;">
                <h3 class="section-title" style="width:auto;">Password updated</h3>
                <div class="section-line"></div>
            </div>
            <p class="section-caption" style="width:auto; margin-top:0;">Your password has been successfully changed.</p>
            <a class="start-planing__btn" href="{% url 'account:user_login' %}" style="display:inline-flex; margin-top:2rem;">Go to Login</a>
        </div>
    </div>
</main>
{% endblock %}
