{% extends  'base/index.html' %}
{% load static %}
{% block title %}
	Password Reset
{% endblock %}
{% block content %}
    <main class="main" style="background:#f3f6fd; min-height: calc(100vh - 72px);">
        <div class="container" style="display:flex; align-items:center; justify-content:center; padding:4rem 0;">
            <div class="auth-card">
                <div class="section-head" style="margin-bottom:1.5rem;">
                    <h3 class="section-title" style="width:auto;">Reset your password</h3>
                    <div class="section-line"></div>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="auth-field">
                        <label class="auth-label" for="{{ form.email.id_for_label }}">Email</label>
                        <input name="{{ form.email.name }}" id="{{ form.email.id_for_label }}" type="email"
                               class="auth-input" placeholder="Enter your email">
                    </div>
                    <button class="start-planing__btn" type="submit" style="width:100%; margin-top:1.5rem;">Send reset
                        link
                    </button>
                </form>
            </div>
        </div>
    </main>
{% endblock %}
