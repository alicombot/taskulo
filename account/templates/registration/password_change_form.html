{% extends  'base/index.html' %}
{% load static %}
{% block title %}
	Password Chanage
{% endblock %}
{% block content %}
    <main class="main" style="background:#f3f6fd; min-height: calc(100vh - 72px);">
        <div class="container" style="display:flex; align-items:center; justify-content:center; padding:4rem 0;">
            <div class="auth-card">
                <div class="section-head" style="margin-bottom:1.5rem;">
                    <h3 class="section-title" style="width:auto;">Change Password</h3>
                    <div class="section-line"></div>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="auth-field">
                        <label class="auth-label" for="{{ form.old_password.id_for_label }}">Current password</label>
                        <input name="{{ form.old_password.name }}" id="{{ form.old_password.id_for_label }}"
                               type="password" class="auth-input" placeholder="Enter current password">
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="{{ form.new_password1.id_for_label }}">New password</label>
                        <input name="{{ form.new_password1.name }}" id="{{ form.new_password1.id_for_label }}"
                               type="password" class="auth-input" placeholder="Enter new password">
                    </div>
                    <div class="auth-field">
                        <label class="auth-label" for="{{ form.new_password2.id_for_label }}">Confirm New
                            password</label>
                        <input name="{{ form.new_password2.name }}" id="{{ form.new_password2.id_for_label }}"
                               type="password" class="auth-input" placeholder="Enter new password">
                    </div>

                    <button class="start-planing__btn" type="submit" style="width:100%; margin-top:1.5rem;">Update
                        Password
                    </button>
                </form>
            </div>
        </div>
    </main>
{% endblock %}
